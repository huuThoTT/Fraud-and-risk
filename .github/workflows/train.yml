name: 🤖 ML Training Pipeline (CML + MLflow)

on:
  push:
    branches: [main, develop]
    paths:
      - 'ml/**'
      - '.github/workflows/train.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ml/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Cấp quyền write cho GITHUB_TOKEN để CML có thể post comment
permissions:
  contents: write
  pull-requests: write

jobs:
  train:
    name: Train & Evaluate Fraud Detection Model
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      # ── 3. Setup CML ─────────────────────────────────────────────────────
      - name: 🔧 Setup CML
        uses: iterative/setup-cml@v2

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: 📦 Install dependencies
        run: pip install -r ml/requirements.txt

      # ── 5. Start MLflow server (in background) ────────────────────────────
      - name: 🗄️ Start MLflow tracking server
        run: |
          mkdir -p mlflow-data/mlruns mlflow-data/artifacts
          mlflow server \
            --backend-store-uri sqlite:///mlflow-data/mlruns/mlflow.db \
            --default-artifact-root ./mlflow-data/artifacts \
            --host 0.0.0.0 --port 5000 &
          # Đợi server sẵn sàng
          for i in {1..15}; do
            curl -sf http://localhost:5000/health && echo "✅ MLflow ready" && break
            echo "Waiting for MLflow... ($i/15)"
            sleep 2
          done

      # ── 6. Generate synthetic data ────────────────────────────────────────
      - name: 🗃️ Generate synthetic training data
        working-directory: ml
        run: |
          mkdir -p ../data
          python generate_synthetic_data.py
          echo "✅ Rows: $(wc -l < ../data/synthetic_transactions.csv)"

      # ── 7. Train model + MLflow tracking ─────────────────────────────────
      - name: 🏋️ Train XGBoost + log to MLflow
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: |
          python ml/train_model.py \
            --data-path  data/synthetic_transactions.csv \
            --model-path ml/fraud_model.pkl \
            --metrics-path metrics.json \
            --plots-dir  plots \
            --experiment fraud-detection \
            --mlflow-uri http://localhost:5000

      # ── 8. Create CML Report ──────────────────────────────────────────────
      - name: 📊 Create CML Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ACCURACY=$(python -c "import json; m=json.load(open('metrics.json')); print(m['accuracy'])")
          PRECISION=$(python -c "import json; m=json.load(open('metrics.json')); print(m['precision'])")
          RECALL=$(python -c "import json; m=json.load(open('metrics.json')); print(m['recall'])")
          F1=$(python -c "import json; m=json.load(open('metrics.json')); print(m['f1_score'])")
          AUC=$(python -c "import json; m=json.load(open('metrics.json')); print(m['auc_roc'])")
          RUN_ID=$(python -c "import json; m=json.load(open('metrics.json')); print(m.get('mlflow_run_id','N/A'))")
          TRAIN_N=$(python -c "import json; m=json.load(open('metrics.json')); print(m['train_samples'])")
          TEST_N=$(python -c "import json; m=json.load(open('metrics.json')); print(m['test_samples'])")

          cat > report.md << EOF
          # 🤖 ML Training Report — Fraud Detection

          > **Commit:** \`${{ github.sha }}\` | **Branch:** \`${{ github.ref_name }}\`
          > **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          > **MLflow Run ID:** \`${RUN_ID}\`

          ## 📊 Model Metrics

          | Metric | Value |
          |--------|-------|
          | ✅ Accuracy | **${ACCURACY}** |
          | 🎯 Precision | **${PRECISION}** |
          | 🔍 Recall | **${RECALL}** |
          | ⚖️ F1-Score | **${F1}** |
          | 📈 AUC-ROC | **${AUC}** |

          ## 📁 Dataset Info

          | | Size |
          |--|--|
          | Train samples | ${TRAIN_N} |
          | Test samples | ${TEST_N} |

          ## 🗃️ Confusion Matrix

          ![Confusion Matrix](plots/confusion_matrix.png)

          ## 🏆 Feature Importance (Top 15)

          ![Feature Importance](plots/feature_importance.png)

          ---
          *Generated by [CML](https://cml.dev) + [MLflow](https://mlflow.org) · $(date -u '+%Y-%m-%d %H:%M UTC')*
          EOF

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cml comment create --pr report.md
          else
            cml comment create --commit-sha=${{ github.sha }} report.md || \
            echo "⚠️ Could not post commit comment. Check repo Settings → Actions → Workflow permissions."
          fi

      # ── 9. Upload artifacts ───────────────────────────────────────────────
      - name: 💾 Upload model + MLflow DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: fraud-model-${{ github.sha }}
          path: |
            ml/fraud_model.pkl
            metrics.json
            plots/
            mlflow-data/
          retention-days: 30

      # ── 10. Job summary ───────────────────────────────────────────────────
      - name: 📋 Write job summary
        run: |
          echo "## 🎯 Training Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          m = json.load(open('metrics.json'))
          for k, v in m.items():
              print(f'| {k} | {v} |')
          " >> $GITHUB_STEP_SUMMARY
