name: 🤖 ML Training Pipeline (CML)

on:
  push:
    branches: [main, develop]
    paths:
      - 'ml/**'
      - '.github/workflows/train.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ml/**'

# Chỉ chạy 1 pipeline cùng lúc để tránh race condition
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Cấp quyền write cho GITHUB_TOKEN để CML có thể post comment
permissions:
  contents: write
  pull-requests: write

jobs:
  train:
    name: Train & Evaluate Fraud Detection Model
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: 📂 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ─────────────────────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      # ── 3. Setup CML ─────────────────────────────────────────────────────
      - name: 🔧 Setup CML
        uses: iterative/setup-cml@v2

      # ── 4. Install dependencies ──────────────────────────────────────────
      - name: 📦 Install dependencies
        run: pip install -r ml/requirements.txt

      # ── 5. Generate synthetic data ───────────────────────────────────────
      - name: 🗄️ Generate synthetic training data
        working-directory: ml
        run: |
          mkdir -p ../data
          python generate_synthetic_data.py
          echo "✅ Data generated: $(wc -l < ../data/synthetic_transactions.csv) rows"

      # ── 6. Train model ───────────────────────────────────────────────────
      - name: 🏋️ Train XGBoost fraud detection model
        run: |
          python ml/train_model.py \
            --data-path data/synthetic_transactions.csv \
            --model-path ml/fraud_model.pkl \
            --metrics-path metrics.json \
            --plots-dir plots

      # ── 7. Create CML Report ─────────────────────────────────────────────
      - name: 📊 Create CML Report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Đọc metrics từ JSON
          ACCURACY=$(python -c "import json; m=json.load(open('metrics.json')); print(m['accuracy'])")
          PRECISION=$(python -c "import json; m=json.load(open('metrics.json')); print(m['precision'])")
          RECALL=$(python -c "import json; m=json.load(open('metrics.json')); print(m['recall'])")
          F1=$(python -c "import json; m=json.load(open('metrics.json')); print(m['f1_score'])")
          AUC=$(python -c "import json; m=json.load(open('metrics.json')); print(m['auc_roc'])")
          TRAIN_N=$(python -c "import json; m=json.load(open('metrics.json')); print(m['train_samples'])")
          TEST_N=$(python -c "import json; m=json.load(open('metrics.json')); print(m['test_samples'])")
          FRAUD_R=$(python -c "import json; m=json.load(open('metrics.json')); print(m['fraud_ratio'])")

          # Tạo markdown report
          cat > report.md << EOF
          # 🤖 ML Training Report — Fraud Detection

          > **Commit:** \`${{ github.sha }}\` | **Branch:** \`${{ github.ref_name }}\`
          > **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ## 📊 Model Metrics

          | Metric | Value |
          |--------|-------|
          | ✅ Accuracy | **${ACCURACY}** |
          | 🎯 Precision | **${PRECISION}** |
          | 🔍 Recall | **${RECALL}** |
          | ⚖️ F1-Score | **${F1}** |
          | 📈 AUC-ROC | **${AUC}** |

          ## 📁 Dataset Info

          | | Size |
          |--|--|
          | Train samples | ${TRAIN_N} |
          | Test samples | ${TEST_N} |
          | Fraud ratio | ${FRAUD_R} |

          ## 🗃️ Confusion Matrix

          ![Confusion Matrix](plots/confusion_matrix.png)

          ## 🏆 Feature Importance (Top 15)

          ![Feature Importance](plots/feature_importance.png)

          ---
          *Generated by [CML](https://cml.dev) · $(date -u '+%Y-%m-%d %H:%M UTC')*
          EOF

          # Post report: dùng --pr khi là pull_request event, --commit khi là push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cml comment create --pr report.md
          else
            cml comment create --commit-sha=${{ github.sha }} report.md || \
            echo "⚠️ Could not post commit comment (permission). Check repo Settings → Actions → Workflow permissions."
          fi

      # ── 8. Upload model artifact ─────────────────────────────────────────
      - name: 💾 Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: fraud-model-${{ github.sha }}
          path: |
            ml/fraud_model.pkl
            metrics.json
            plots/
          retention-days: 30

      # ── 9. Upload metrics summary ────────────────────────────────────────
      - name: 📋 Write job summary
        run: |
          echo "## 🎯 Training Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json
          m = json.load(open('metrics.json'))
          for k, v in m.items():
              print(f'| {k} | {v} |')
          " >> $GITHUB_STEP_SUMMARY
